---
layout: default
title: Blog
---

<div class="blog-page">
    <h1>Blog</h1>

    <div class="blog-grid">
        {% for post in site.posts %}
        <article class="blog-card">
            <h3><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h3>
            <p>{{ post.description | default: post.excerpt | strip_html | truncate: 150 }}</p>
            <span class="date">{{ post.date | date: '%B %d, %Y' }}</span>
        </article>
        {% endfor %}
    </div>
</div>
